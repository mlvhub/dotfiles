# Kitty — runs on the Bazzite host (installed to ~/.local/kitty.app, shared home).
# Config is in shared $HOME but only the host app reads it.
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# --- Shell -----------------------------------------------------------------
# Launch Fish. Use the `dev` abbr (or a Kitty tab) to enter the distrobox.
shell fish

# --- Font (Nerd Font so Starship glyphs render) ----------------------------
font_family      JetBrainsMono Nerd Font
font_size        12.0

# --- Appearance ------------------------------------------------------------
background_opacity      0.96
window_padding_width    6
cursor_shape            block
scrollback_lines        10000
enable_audio_bell       no
confirm_os_window_close 0
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted

# --- Layouts (splits) ------------------------------------------------------
enabled_layouts splits,stack

# --- Keybinds: tabs --------------------------------------------------------
map ctrl+shift+t        new_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+right    next_tab

# --- Keybinds: splits ------------------------------------------------------
map ctrl+shift+enter    launch --location=vsplit --cwd=current
map ctrl+shift+d        launch --location=hsplit --cwd=current
map ctrl+shift+w        close_window
map ctrl+shift+z        toggle_layout stack
map ctrl+alt+left       neighboring_window left
map ctrl+alt+right      neighboring_window right
map ctrl+alt+up         neighboring_window up
map ctrl+alt+down       neighboring_window down

# --- Theme: Catppuccin Mocha (inlined, no external download) ---------------
